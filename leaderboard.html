<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaderboard — Manager Simulator</title>
    <meta
      name="description"
      content="The Manager Simulator leaderboard. One 60-second workday. Zero chill."
    />
    <style>
      /* Standalone page — deliberately tiny and self-contained (no game bundle,
         no Three.js). Mirrors the report card's paper aesthetic. */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --ink-deep: #171d33;
        --paper: #f4efe3;
        --paper-ink: #2a2724;
        --paper-rule: #b9ae97;
        --gold: #d99e14;
        --mint: #17a86a;
        --urgent: #ff5b5b;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 40px 16px 60px;
        background: var(--ink-deep);
        font-family: Georgia, 'Times New Roman', serif;
        color: var(--paper-ink);
      }
      .board {
        width: min(560px, 100%);
        background: var(--paper);
        border: 1px solid var(--paper-rule);
        box-shadow:
          0 24px 70px rgba(0, 0, 0, 0.55),
          inset 0 0 0 4px var(--paper),
          inset 0 0 0 5px var(--paper-rule);
        padding: 30px 34px 26px;
      }
      .datebar {
        text-align: center;
        font-size: 13px;
        letter-spacing: 0.18em;
        color: rgba(42, 39, 36, 0.65);
        text-transform: uppercase;
      }
      .rule {
        height: 1px;
        background: var(--paper-rule);
        margin: 12px 0;
      }
      .rule.double { height: 3px; border-top: 1px solid var(--paper-rule); border-bottom: 1px solid var(--paper-rule); background: none; }
      h1 {
        text-align: center;
        font-size: 26px;
        letter-spacing: 0.04em;
        margin: 10px 0 2px;
      }
      .sub {
        text-align: center;
        font-size: 13px;
        font-style: italic;
        color: rgba(42, 39, 36, 0.6);
        margin-bottom: 14px;
      }
      .admin-badge {
        display: none;
        margin: 0 auto 10px;
        width: fit-content;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
        color: #fff;
        background: var(--urgent);
        padding: 3px 10px;
        border-radius: 999px;
        font-family: system-ui, sans-serif;
        animation: pulse 1.1s ease-in-out infinite;
      }
      .admin .admin-badge { display: block; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
      .list { display: flex; flex-direction: column; gap: 3px; }
      .row {
        display: grid;
        grid-template-columns: 34px 1fr auto auto;
        align-items: center;
        gap: 10px;
        padding: 7px 10px;
        border-radius: 6px;
        font-size: 15px;
      }
      .row:nth-child(odd) { background: rgba(42, 39, 36, 0.05); }
      .rank { font-weight: 800; text-align: center; color: rgba(42, 39, 36, 0.7); }
      .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .score { font-weight: 800; font-variant-numeric: tabular-nums; }
      .del {
        display: none;
        border: none;
        background: var(--urgent);
        color: #fff;
        width: 22px;
        height: 22px;
        border-radius: 5px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }
      .admin .del { display: block; }
      .empty, .error {
        text-align: center;
        font-style: italic;
        color: rgba(42, 39, 36, 0.6);
        padding: 18px 0;
      }
      .error { color: var(--urgent); }
      .cta-row { text-align: center; margin-top: 20px; }
      .play {
        display: inline-block;
        font-family: system-ui, sans-serif;
        font-weight: 800;
        font-size: 15px;
        letter-spacing: 0.03em;
        color: var(--ink-deep);
        background: #ffc94d;
        padding: 11px 26px;
        border-radius: 10px;
        text-decoration: none;
        box-shadow: 0 3px 0 #d99e14;
      }
      .play:hover { filter: brightness(1.05); }
      .powered {
        display: block;
        margin-top: 18px;
        padding-top: 12px;
        border-top: 1px solid var(--paper-rule);
        text-align: center;
        font-family: system-ui, sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(42, 39, 36, 0.55);
        text-decoration: none;
      }
      .powered b { color: var(--mint); }
      .updated {
        text-align: center;
        font-size: 11px;
        color: rgba(42, 39, 36, 0.45);
        margin-top: 8px;
        font-family: system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <main class="board" id="board">
      <div class="datebar">Q3 Performance Review — July</div>
      <div class="rule double"></div>
      <h1>🏆 Leaderboard</h1>
      <div class="sub">One 60-second workday. Zero chill.</div>
      <div class="admin-badge">ADMIN — click ✕ to remove</div>
      <div class="list" id="list">
        <div class="empty">Loading scores…</div>
      </div>
      <div class="updated" id="updated"></div>
      <div class="cta-row"><a class="play" href="./">▶ PLAY THE GAME</a></div>
      <a
        class="powered"
        href="https://withjuly.com"
        target="_blank"
        rel="noopener noreferrer"
        >powered by <b>⚡ July</b></a
      >
    </main>
    <script type="module" src="/src/leaderboard-page.js"></script>
  </body>
</html>
