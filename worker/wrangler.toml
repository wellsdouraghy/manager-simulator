# Manager Simulator leaderboard Worker.
# Deploy: see worker/DEPLOY.md. The ADMIN_SECRET is set via `wrangler secret`
# (NOT committed here — this repo is public). The KV namespace id is filled in
# by `wrangler kv namespace create LEADERBOARD`.
name = "manager-leaderboard"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Filled in after: wrangler kv namespace create LEADERBOARD
[[kv_namespaces]]
binding = "LEADERBOARD"
id = "59c14cc995384c37bc269247858209db"
